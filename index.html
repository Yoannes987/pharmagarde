<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>ANN_PHARMA_TG</title>
    <style>
        /* ===== RESET ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --primary: #0a7e3c;
            --primary-dark: #06542a;
            --primary-light: #e8f5ee;
            --gray-50: #f7faf7;
            --gray-100: #eef3ee;
            --gray-200: #dce4dc;
            --gray-300: #b8c8b8;
            --gray-600: #5a6e5a;
            --gray-800: #1c2a1c;
            --shadow: 0 2px 16px rgba(0, 20, 0, 0.06);
            --radius: 14px;
            --radius-sm: 8px;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--gray-50);
            color: var(--gray-800);
            padding: 18px 14px 130px 14px;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ===== HEADER ===== */
        .app-header {
            text-align: center;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--gray-200);
            margin-bottom: 18px;
        }
        .app-header h1 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--primary-dark);
        }
        .app-header h1 span {
            font-weight: 300;
            color: var(--gray-600);
        }
        .app-header p {
            font-size: 14px;
            color: var(--gray-600);
            margin-top: 2px;
        }

        /* ===== FILTRES ===== */
        .filters {
            background: #fff;
            border-radius: var(--radius);
            padding: 16px 16px 14px 16px;
            box-shadow: var(--shadow);
            margin-bottom: 18px;
        }
        .filters-row {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .filters-row input,
        .filters-row select {
            width: 100%;
            padding: 11px 15px;
            border: 1.5px solid var(--gray-200);
            border-radius: var(--radius-sm);
            font-size: 15px;
            background: var(--gray-50);
            color: var(--gray-800);
            outline: none;
            transition: border 0.2s, background 0.2s;
            -webkit-appearance: none;
            appearance: none;
        }
        .filters-row input:focus,
        .filters-row select:focus {
            border-color: var(--primary);
            background: #fff;
        }
        .filters-row input::placeholder {
            color: var(--gray-300);
        }

        .filters-bottom {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding-top: 4px;
        }
        .toggle-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 500;
            color: var(--gray-600);
            cursor: pointer;
            user-select: none;
            flex-shrink: 0;
        }
        .toggle-wrap input[type="checkbox"] {
            width: 38px;
            height: 20px;
            -webkit-appearance: none;
            appearance: none;
            background: var(--gray-300);
            border-radius: 30px;
            position: relative;
            outline: none;
            transition: background 0.25s;
            cursor: pointer;
            flex-shrink: 0;
        }
        .toggle-wrap input[type="checkbox"]::after {
            content: "";
            position: absolute;
            top: 2px;
            left: 2px;
            width: 16px;
            height: 16px;
            background: #fff;
            border-radius: 50%;
            transition: transform 0.25s;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.15);
        }
        .toggle-wrap input[type="checkbox"]:checked {
            background: var(--primary);
        }
        .toggle-wrap input[type="checkbox"]:checked::after {
            transform: translateX(18px);
        }

        .stats {
            font-size: 13px;
            color: var(--gray-600);
            text-align: right;
            padding-top: 0;
            margin: 0;
            flex-shrink: 0;
        }

        /* ===== LISTE ===== */
        #pharmacyList {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 22px;
        }

        .card {
            background: #fff;
            border-radius: var(--radius);
            padding: 16px 16px 14px 16px;
            box-shadow: var(--shadow);
            border-left: 4px solid var(--primary);
            transition: transform 0.12s;
        }
        .card.garde {
            border-left-color: #c07a2a;
            background: #fefbf5;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
        }
        .card-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--gray-800);
            line-height: 1.3;
        }
        .card-badge {
            font-size: 10px;
            font-weight: 600;
            background: #c07a2a;
            color: #fff;
            padding: 2px 12px;
            border-radius: 30px;
            white-space: nowrap;
            flex-shrink: 0;
            margin-top: 2px;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }
        .card-zone {
            font-size: 13px;
            color: var(--gray-600);
            margin: 3px 0 5px 0;
            font-weight: 500;
        }
        .card-location {
            font-size: 13px;
            color: #5a6e5a;
            line-height: 1.4;
            margin-bottom: 11px;
        }
        .card-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 2px;
        }
        .card-actions a {
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            transition: background 0.15s, transform 0.1s;
            border: none;
            cursor: pointer;
        }
        .card-actions a:active {
            transform: scale(0.97);
        }
        .btn-call {
            background: var(--primary);
            color: #fff;
        }
        .btn-call:hover {
            background: var(--primary-dark);
        }
        .btn-map {
            background: var(--gray-100);
            color: var(--gray-800);
        }
        .btn-map:hover {
            background: var(--gray-200);
        }

        /* ===== PAGINATION ===== */
        .pagination {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 5px;
            margin: 4px 0 6px 0;
        }
        .pagination button {
            padding: 6px 13px;
            border-radius: var(--radius-sm);
            border: 1.5px solid var(--gray-200);
            background: #fff;
            color: var(--gray-800);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.15s;
            min-width: 38px;
        }
        .pagination button.active {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
        }
        .pagination button:hover:not(.active):not(:disabled) {
            background: var(--gray-100);
        }
        .pagination button:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .pagination-ellipsis {
            display: flex;
            align-items: center;
            padding: 0 4px;
            color: var(--gray-300);
            font-weight: 500;
        }

        /* ===== CHATBOT ===== */
        .chat-fab {
            position: fixed;
            bottom: 22px;
            right: 18px;
            width: 54px;
            height: 54px;
            border-radius: 50%;
            background: var(--primary);
            color: #fff;
            border: none;
            font-size: 22px;
            box-shadow: 0 4px 20px rgba(10, 126, 60, 0.35);
            cursor: pointer;
            z-index: 1000;
            transition: transform 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
        .chat-fab:hover {
            transform: scale(1.06);
        }
        .chat-fab:active {
            transform: scale(0.94);
        }

        .chat-window {
            position: fixed;
            bottom: 90px;
            right: 14px;
            width: 350px;
            max-width: 92vw;
            height: 460px;
            max-height: 68vh;
            background: #fff;
            border-radius: var(--radius);
            box-shadow: 0 8px 48px rgba(0, 0, 0, 0.16);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 999;
            opacity: 0;
            transform: scale(0.92) translateY(12px);
            pointer-events: none;
            transition: opacity 0.25s, transform 0.25s;
            border: 1px solid var(--gray-200);
        }
        .chat-window.open {
            opacity: 1;
            transform: scale(1) translateY(0);
            pointer-events: auto;
        }
        .chat-window.hidden {
            display: none;
        }

        .chat-header {
            background: var(--primary);
            color: #fff;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            font-size: 15px;
            flex-shrink: 0;
        }
        .chat-header button {
            background: none;
            border: none;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            opacity: 0.75;
            padding: 0 4px;
            transition: opacity 0.15s;
        }
        .chat-header button:hover {
            opacity: 1;
        }

        .chat-messages {
            flex: 1;
            padding: 12px 14px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
            background: #f7faf7;
        }
        .chat-messages .msg {
            max-width: 88%;
            padding: 9px 14px;
            border-radius: 14px;
            font-size: 14px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .chat-messages .msg-bot {
            background: var(--primary-light);
            color: var(--gray-800);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .chat-messages .msg-user {
            background: var(--primary);
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .chat-messages .msg-suggestion {
            background: #fff;
            color: var(--primary);
            border: 1.5px solid var(--primary);
            align-self: flex-start;
            cursor: pointer;
            font-size: 13px;
            padding: 5px 14px;
            border-radius: 30px;
            transition: background 0.15s, transform 0.1s;
            font-weight: 500;
        }
        .chat-messages .msg-suggestion:hover {
            background: var(--primary-light);
        }
        .chat-messages .msg-suggestion:active {
            transform: scale(0.96);
        }

        .suggestions-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 6px;
        }
        .suggestions-grid .msg-suggestion {
            flex: 0 0 auto;
        }

        .chat-input-area {
            display: flex;
            border-top: 1px solid var(--gray-200);
            padding: 8px 12px;
            background: #fff;
            gap: 8px;
            flex-shrink: 0;
        }
        .chat-input-area input {
            flex: 1;
            border: 1.5px solid var(--gray-200);
            padding: 9px 14px;
            border-radius: 30px;
            font-size: 14px;
            outline: none;
            background: var(--gray-50);
            transition: border 0.2s;
        }
        .chat-input-area input:focus {
            border-color: var(--primary);
        }
        .chat-input-area button {
            background: var(--primary);
            border: none;
            color: #fff;
            width: 42px;
            border-radius: 50%;
            font-size: 17px;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .chat-input-area button:hover {
            background: var(--primary-dark);
        }
        .chat-input-area button:active {
            transform: scale(0.93);
        }

        /* ===== RESPONSIVE ===== */
        @media (min-width: 600px) {
            body {
                padding: 28px 40px 130px 40px;
                max-width: 740px;
                margin: 0 auto;
            }
            .chat-window {
                width: 400px;
                height: 500px;
                right: 24px;
                bottom: 98px;
            }
            .filters-row {
                flex-direction: row;
                gap: 10px;
                align-items: center;
                flex-wrap: wrap;
            }
            .filters-row input {
                flex: 2;
                min-width: 160px;
            }
            .filters-row select {
                flex: 1;
                min-width: 130px;
            }
            .filters-bottom {
                flex: 0 1 auto;
                justify-content: flex-end;
                gap: 14px;
            }
            .stats {
                text-align: right;
            }
        }
        @media (max-width: 420px) {
            .filters-bottom {
                flex-direction: row;
                justify-content: space-between;
                gap: 6px;
            }
            .toggle-wrap {
                font-size: 13px;
            }
            .stats {
                font-size: 12px;
            }
            .chat-window {
                right: 8px;
                width: 94vw;
                height: 440px;
                bottom: 82px;
            }
            .chat-fab {
                width: 50px;
                height: 50px;
                font-size: 20px;
                right: 14px;
                bottom: 18px;
            }
        }

        /* ===== SCROLLBAR ===== */
        .chat-messages::-webkit-scrollbar {
            width: 4px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--gray-300);
            border-radius: 10px;
        }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            text-align: center;
            padding: 48px 16px;
            color: var(--gray-600);
            font-size: 15px;
            line-height: 1.6;
        }
        .empty-state span {
            font-size: 32px;
            display: block;
            margin-bottom: 10px;
        }
    </style>
</head>

        // ============================================================
        // CŒUR DE L'APPLICATION
        // ============================================================
        const data = allPharmacies;
        let currentPage = 1;
        const PER_PAGE = 15;

        const listEl = document.getElementById('pharmacyList');
        const searchInput = document.getElementById('searchInput');
        const zoneFilter = document.getElementById('zoneFilter');
        const gardeToggle = document.getElementById('gardeToggle');
        const statsEl = document.getElementById('stats');
        const paginationEl = document.getElementById('pagination');

        // Remplir les zones
        const zones = [...new Set(data.map(p => p.zone))].sort();
        zones.forEach(z => {
            const opt = document.createElement('option');
            opt.value = z;
            opt.textContent = z;
            zoneFilter.appendChild(opt);
        });

        function getFiltered() {
            const q = searchInput.value.toLowerCase().trim();
            const zone = zoneFilter.value;
            const garde = gardeToggle.checked;
            return data.filter(p => {
                const matchNom = p.nom.toLowerCase().includes(q);
                const matchZone = zone === 'all' || p.zone === zone;
                const matchGarde = garde ? p.est_de_garde === true : true;
                return matchNom && matchZone && matchGarde;
            });
        }

        function render() {
            const filtered = getFiltered();
            const total = filtered.length;
            const totalPages = Math.ceil(total / PER_PAGE) || 1;
            if (currentPage > totalPages) currentPage = totalPages;
            if (currentPage < 1) currentPage = 1;

            const start = (currentPage - 1) * PER_PAGE;
            const pageItems = filtered.slice(start, start + PER_PAGE);

            statsEl.textContent = `${total} pharmacie${total > 1 ? 's' : ''}`;

            if (pageItems.length === 0) {
                listEl.innerHTML = `<div class="empty-state"><span>🔍</span>Aucune pharmacie trouvée</div>`;
            } else {
                listEl.innerHTML = pageItems.map(p => {
                    const gardeBadge = p.est_de_garde ? `<span class="card-badge">Garde</span>` : '';
                    const tel = p.telephone || '';
                    const mapUrl =
                        `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(p.nom + ' ' + (p.localisation || ''))}`;
                    return `
                        <div class="card ${p.est_de_garde ? 'garde' : ''}">
                            <div class="card-header">
                                <span class="card-name">${p.nom}</span>
                                ${gardeBadge}
                            </div>
                            <div class="card-zone">${p.zone}</div>
                            ${p.localisation ? `<div class="card-location">${p.localisation}</div>` : ''}
                            <div class="card-actions">
                                ${tel ? `<a href="tel:${tel}" class="btn-call">Appeler</a>` : ''}
                                <a href="${mapUrl}" target="_blank" class="btn-map">Itinéraire</a>
                            </div>
                        </div>
                    `;
                }).join('');
            }

            // Pagination
            if (totalPages <= 1) {
                paginationEl.innerHTML = '';
                return;
            }
            let html = `<button ${currentPage === 1 ? 'disabled' : ''} onclick="goTo(${currentPage - 1})">‹</button>`;
            const maxVisible = 5;
            let s = Math.max(1, currentPage - Math.floor(maxVisible / 2));
            let e = Math.min(totalPages, s + maxVisible - 1);
            if (e - s < maxVisible - 1) s = Math.max(1, e - maxVisible + 1);
            if (s > 1) {
                html += `<button onclick="goTo(1)">1</button>`;
                if (s > 2) html += `<span class="pagination-ellipsis">…</span>`;
            }
            for (let i = s; i <= e; i++) {
                html += `<button class="${i === currentPage ? 'active' : ''}" onclick="goTo(${i})">${i}</button>`;
            }
            if (e < totalPages) {
                if (e < totalPages - 1) html += `<span class="pagination-ellipsis">…</span>`;
                html += `<button onclick="goTo(${totalPages})">${totalPages}</button>`;
            }
            html += `<button ${currentPage === totalPages ? 'disabled' : ''} onclick="goTo(${currentPage + 1})">›</button>`;
            paginationEl.innerHTML = html;
        }

        function goTo(page) {
            const filtered = getFiltered();
            const totalPages = Math.ceil(filtered.length / PER_PAGE) || 1;
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            render();
            document.getElementById('pharmacyList').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        searchInput.addEventListener('input', () => { currentPage = 1;
            render(); });
        zoneFilter.addEventListener('change', () => { currentPage = 1;
            render(); });
        gardeToggle.addEventListener('change', () => { currentPage = 1;
            render(); });

        // ============================================================
        // CHATBOT AVANCÉ AVEC DÉTECTION SÉMANTIQUE
        // ============================================================
        const chatToggle = document.getElementById('chatToggle');
        const chatWindow = document.getElementById('chatWindow');
        const chatClose = document.getElementById('chatClose');
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const chatSend = document.getElementById('chatSend');

        chatToggle.addEventListener('click', () => {
            chatWindow.classList.toggle('hidden');
            chatWindow.classList.toggle('open');
        });
        chatClose.addEventListener('click', () => {
            chatWindow.classList.add('hidden');
            chatWindow.classList.remove('open');
        });

        // Suggestions cliquables
        document.querySelectorAll('.msg-suggestion').forEach(el => {
            el.addEventListener('click', () => {
                chatInput.value = el.dataset.query || el.textContent.trim();
                sendChatMessage();
            });
        });

        function sendChatMessage() {
            const text = chatInput.value.trim();
            if (!text) return;
            chatMessages.innerHTML += `<div class="msg msg-user">${text}</div>`;
            chatInput.value = '';
            chatMessages.scrollTop = chatMessages.scrollHeight;

            setTimeout(() => {
                const lower = text.toLowerCase();
                let response = '';

                // 1. Détection des pharmacies de garde
                if (lower.includes('garde') || lower.includes('gardes') || lower.includes('urgent') || lower.includes(
                    'urgence')) {
                    const gardes = data.filter(p => p.est_de_garde);
                    if (gardes.length > 0) {
                        response = '🛡️ Pharmacies de garde actuellement :\n' + gardes.map(p =>
                            `• ${p.nom} (${p.zone})`).join('\n');
                    } else {
                        response = 'Aucune pharmacie de garde enregistrée pour le moment.';
                    }
                }
                // 2. Détection de ville / zone
                else if (lower.includes('lomé') || lower.includes('lome')) {
                    const results = data.filter(p => p.ville === 'Lomé' || p.zone.includes('Lomé'));
                    if (results.length > 0) {
                        response = '📍 Pharmacies à Lomé (' + results.length + ' résultat(s)) :\n' + results.slice(0,
                            10).map(p => `• ${p.nom} (${p.zone})`).join('\n') + (results.length > 10 ?
                            `\n... et ${results.length - 10} autre(s).` : '');
                    } else {
                        response = 'Aucune pharmacie trouvée à Lomé.';
                    }
                } else if (lower.includes('kara')) {
                    const results = data.filter(p => p.ville === 'Kara' || p.zone.includes('Kara'));
                    if (results.length > 0) {
                        response = '📍 Pharmacies à Kara (' + results.length + ' résultat(s)) :\n' + results.slice(0,
                            10).map(p => `• ${p.nom} (${p.zone})`).join('\n') + (results.length > 10 ?
                            `\n... et ${results.length - 10} autre(s).` : '');
                    } else {
                        response = 'Aucune pharmacie trouvée à Kara.';
                    }
                } else if (lower.includes('kpalimé') || lower.includes('kpalime')) {
                    const results = data.filter(p => p.ville === 'Kpalimé' || p.zone.includes('Kpalimé'));
                    if (results.length > 0) {
                        response = '📍 Pharmacies à Kpalimé (' + results.length + ' résultat(s)) :\n' + results.slice(0,
                            10).map(p => `• ${p.nom} (${p.zone})`).join('\n') + (results.length > 10 ?
                            `\n... et ${results.length - 10} autre(s).` : '');
                    } else {
                        response = 'Aucune pharmacie trouvée à Kpalimé.';
                    }
                } else if (lower.includes('sokodé') || lower.includes('sokode')) {
                    const results = data.filter(p => p.ville === 'Sokodé' || p.zone.includes('Sokodé'));
                    if (results.length > 0) {
                        response = '📍 Pharmacies à Sokodé (' + results.length + ' résultat(s)) :\n' + results.slice(0,
                            10).map(p => `• ${p.nom} (${p.zone})`).join('\n') + (results.length > 10 ?
                            `\n... et ${results.length - 10} autre(s).` : '');
                    } else {
                        response = 'Aucune pharmacie trouvée à Sokodé.';
                    }
                } else if (lower.includes('atakpamé') || lower.includes('atakpame')) {
                    const results = data.filter(p => p.ville === 'Atakpamé' || p.zone.includes('Atakpamé'));
                    if (results.length > 0) {
                        response = '📍 Pharmacies à Atakpamé (' + results.length + ' résultat(s)) :\n' + results.slice(0,
                            10).map(p => `• ${p.nom} (${p.zone})`).join('\n') + (results.length > 10 ?
                            `\n... et ${results.length - 10} autre(s).` : '');
                    } else {
                        response = 'Aucune pharmacie trouvée à Atakpamé.';
                    }
                } else if (lower.includes('tsévié') || lower.includes('tsevie') || lower.includes('tové') || lower.includes(
                    'tove')) {
                    const results = data.filter(p => p.ville === 'Tsévié' || p.zone.includes('Tsévié') || p.zone.includes(
                        'Tové'));
                    if (results.length > 0) {
                        response = '📍 Pharmacies à Tsévié (' + results.length + ' résultat(s)) :\n' + results.slice(0,
                            10).map(p => `• ${p.nom} (${p.zone})`).join('\n') + (results.length > 10 ?
                            `\n... et ${results.length - 10} autre(s).` : '');
                    } else {
                        response = 'Aucune pharmacie trouvée à Tsévié.';
                    }
                } else if (lower.includes('dapaong')) {
                    const results = data.filter(p => p.ville === 'Dapaong' || p.zone.includes('Dapaong'));
                    if (results.length > 0) {
                        response = '📍 Pharmacies à Dapaong (' + results.length + ' résultat(s)) :\n' + results.slice(0,
                            10).map(p => `• ${p.nom} (${p.zone})`).join('\n') + (results.length > 10 ?
                            `\n... et ${results.length - 10} autre(s).` : '');
                    } else {
                        response = 'Aucune pharmacie trouvée à Dapaong.';
                    }
                }
                // 3. Recherche générale par mot-clé
                else {
                    const words = lower.split(' ');
                    const keywords = words.filter(w => w.length > 2);
                    if (keywords.length > 0) {
                        let results = [];
                        keywords.forEach(kw => {
                            const found = data.filter(p =>
                                p.nom.toLowerCase().includes(kw) ||
                                p.zone.toLowerCase().includes(kw) ||
                                p.ville.toLowerCase().includes(kw)
                            );
                            results = results.concat(found);
                        });
                        // Dédupliquer
                        results = results.filter((p, i, self) => self.findIndex(p2 => p2.id === p.id) === i);
                        if (results.length > 0) {
                            response = '🔍 ' + results.length + ' résultat(s) pour "' + keywords.join('", "') +
                                '" :\n' +
                                results.slice(0, 10).map(p => `• ${p.nom} (${p.zone})${p.est_de_garde ? ' 🛡️' : ''}`)
                                .join('\n') +
                                (results.length > 10 ? `\n... et ${results.length - 10} autre(s).` : '');
                        } else {
                            response =
                                'Aucune pharmacie trouvée pour "' + keywords.join('", "') +
                                '". Essayez une ville (Lomé, Kara, Kpalimé, Sokodé, Atakpamé, Tsévié, Dapaong) ou tapez "garde".';
                        }
                    } else {
                        response =
                            'Posez une question sur les pharmacies, les gardes ou une ville (Lomé, Kara, Kpalimé, Sokodé, Atakpamé, Tsévié, Dapaong).';
                    }
                }

                chatMessages.innerHTML += `<div class="msg msg-bot">${response.replace(/\n/g, '<br>')}</div>`;
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }, 400);
        }

        chatSend.addEventListener('click', sendChatMessage);
        chatInput.addEventListener('keypress', e => { if (e.key === 'Enter') sendChatMessage(); });

        // LANCEMENT
        render();
        console.log('ANN_PHARMA_TG chargé - 276 pharmacies');
