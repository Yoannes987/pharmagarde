<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>PharmaGarde Togo | Annuaire professionnel des pharmacies</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="app">
        <!-- En-tête minimaliste -->
        <header class="header">
            <div class="logo">
                <i class="fas fa-prescription-bottle"></i>
                <span>PharmaGarde</span>
                <span class="badge">Togo</span>
            </div>
            <div class="header-actions">
                <button class="ghost-btn" id="aboutBtn">À propos</button>
            </div>
        </header>

        <!-- Section recherche & filtres -->
        <div class="search-section">
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Rechercher une pharmacie ou un quartier...">
            </div>
            <div class="filters-row">
                <select id="zoneSelect">
                    <option value="all">Toutes les zones</option>
                </select>
                <label class="toggle-filter">
                    <input type="checkbox" id="gardeToggle">
                    <span>Garde cette semaine</span>
                </label>
                <button id="resetFilters" class="reset-btn">Réinitialiser</button>
            </div>
        </div>

        <!-- Résultats et pagination -->
        <div class="results-header">
            <span id="resultCount"></span>
            <div class="pagination" id="paginationControls"></div>
        </div>

        <!-- Grille de pharmacies -->
        <div id="pharmacyGrid" class="pharmacy-grid"></div>

        <!-- Pagination basse -->
        <div class="pagination-bottom" id="paginationBottom"></div>

        <!-- Chatbot flottant -->
        <div id="chatWidget" class="chat-widget">
            <div class="chat-button" id="chatButton">
                <i class="fas fa-comment-dots"></i>
            </div>
            <div class="chat-panel hidden" id="chatPanel">
                <div class="chat-header">
                    <span>Assistant PharmaGarde</span>
                    <button id="closeChat"><i class="fas fa-times"></i></button>
                </div>
                <div class="chat-messages" id="chatMessages">
                    <div class="message bot">Bonjour, je suis votre assistant. Comment puis-je vous aider ?</div>
                </div>
                <div class="chat-input-area">
                    <input type="text" id="chatInput" placeholder="Écrivez votre message...">
                    <button id="sendChat"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
